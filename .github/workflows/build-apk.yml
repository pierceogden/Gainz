name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: gainz-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Get short SHA
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release with APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.sha.outputs.short }}
          name: Gainz APK (build ${{ steps.sha.outputs.short }})
          body: |
            Auto-built from main branch.
            Download `app-debug.apk` below and install on your Android phone.
          files: app/build/outputs/apk/debug/app-debug.apk
          make_latest: true
